---
- name: Install requires s/w's on jenkins server
  hosts: jenkins
  tasks:
    - name: Install s/w's
      apt:
        name: "{{item.a}}"
        state: "{{item.b}}"
        update_cache: "{{item.c}}"
      with_items:
        - {a: git,b: present, c: yes}
        - {a: maven,b: present,c: no}
        - {a: openjdk-17-jdk,b: present,c: no}
    - name: Install jenkins
      get_url:
        url: https://get.jenkins.io/war-stable/2.568.1/jenkins.war
        dest: /home/ubuntu

- name: Install s/w's on QA server
  hosts: qa
  tasks:
    - name: Install tomcat10
      apt:
        name: "{{item.a}}"
        state: "{{item.b}}"
        update_cache: "{{item.c}}"
      with_items:
        - {a: tomcat10,b: present,c: yes}
        - {a: tomcat10-admin,b: present,c: no}
    - name: copy tomcat-users.xml file
      copy:
       src: tomcat-users.xml
       dest: /etc/tomcat10
    - name: restart tomcat10
      service:
        name: tomcat10
        state: restarted



- name: Install s/w's on QA server
  hosts: prod
  tasks:
    - name: Install tomcat10
      apt:
        name: "{{item.a}}"
        state: "{{item.b}}"
        update_cache: "{{item.c}}"
      with_items:
        - {a: tomcat10,b: present,c: yes}
        - {a: tomcat10-admin,b: present,c: no}
    - name: copy tomcat-users.xml file
      copy:
       src: tomcat-users.xml
       dest: /etc/tomcat10
    - name: restart tomcat10
      service:
        name: tomcat10
        state: restarted

- name: contdownload and contbuild
  hosts: jenkins
  tasks:
    - name: download code from git
      git:
        repo: https://github.com/Hrithik2230/Maven.git
        dest: /home/mygit
    - name: build artifact from code
      shell: cd /home/mygit;mvn package
    - name: fetch webapp.war file from QA server
      fetch:
        src: /home/mygit/webapp/target/webapp.war
        dest: /tmp

- name: contdeploy and cont testing
  hosts: qa
  tasks:
    - name: copy artifact to qa server
      copy:
        src: /tmp/172.31.30.168/home/mygit/webapp/target
        dest: /var/lib/tomcat10/webapps/testapp.war
    - name: download selenium and run test cases
      git:
        repo: https://github.com/Hrithik2230/Testingcode.git
        dest: test-git

    - name: run test scripts
      shell: java -jar test-git/testing.jar

- name: deploy the artifact into Prodserver
  hosts: prod
  tasks:
    - name: contdownload
      copy:
        src: /tmp/172.31.30.168/home/mygit/webapp/target
        dest: /var/lib/tomcat10/webapps/liveapp.war




...
