---

- name: Exception handling or error handling
  hosts: all
  tasks:
    - block:
        - name: Install git using apt
          apt:
            name: git
            state: present
            update_cache: yes
      
      rescue:
         - name: install git using yum
           yum:
             name: git
             state: present
      always:
         - name: Display success msg
           debug:
             msg: "Git Installation is successful"

...
