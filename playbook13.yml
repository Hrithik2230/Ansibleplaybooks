---
- name: create users and copy files to the users home directories
  hosts: all 
  tasks:
    - name: create users
      user:
        name: "{{item.a}}"
        password: "{{item.b}}"
        home: "{{item.c}}"
      with_items:
        - {a: Rajesh,b: 123456,c: /home/Rajesh}
        - {a: Ramesh,b: 123456,c: /tmp/Ramesh}

    - name: copy files into user's home directories
      copy:
        src: "{{item.a}}"
        dest: "{{item.b}}"
      with_items:
        - {a: /etc/passwd,b: /home/Rajesh}
        - {a: /etc/group,b: /tmp/Ramesh}


...
